<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIS Data Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h1 class="app-title">EIS Data Viewer</h1>
            
            <div class="control-group upload-group">
                <label for="csv-upload" class="upload-btn">
                    📁 Upload CSV File(s)
                    <input type="file" id="csv-upload" accept=".csv" multiple />
                </label>
                <div id="file-name" class="file-name">No files selected</div>
            </div>

            <div id="file-labels-group" class="control-group" style="display: none;">
                <h3>File Label Settings</h3>
                <div id="file-labels-list" class="file-labels-list"></div>
            </div>

            <div class="control-group axis-limits">
                <h3>Axis Limits (kΩ)</h3>
                <div class="axis-inputs">
                    <div class="input-row">
                        <label>X:</label>
                        <input type="number" id="x-min" placeholder="min" step="any">
                        <span>to</span>
                        <input type="number" id="x-max" placeholder="max" step="any">
                    </div>
                    <div class="input-row">
                        <label>Y:</label>
                        <input type="number" id="y-min" placeholder="min" step="any">
                        <span>to</span>
                        <input type="number" id="y-max" placeholder="max" step="any">
                    </div>
                </div>
                <div class="btn-group">
                    <button id="apply-limits-btn" class="btn btn-primary">Apply Limits</button>
                    <button id="auto-scale-btn" class="btn btn-secondary">Auto-Scale</button>
                </div>
                <label class="checkbox-label" style="margin-top: 10px;">
                    <input type="checkbox" id="auto-scale-toggle" checked> Auto-scale when clicking traces
                </label>
                <label class="checkbox-label" style="margin-top: 10px;">
                    <input type="checkbox" id="show-lines-toggle" checked> Show lines between points
                </label>
                <label class="checkbox-label" style="margin-top: 10px;">
                    <input type="checkbox" id="show-labels-toggle" checked> Show labels on chart
                </label>
            </div>

            <div class="control-group">
                <button id="export-btn" class="btn btn-success">Export Selected to CSV</button>
            </div>

            <div class="control-group trace-controls">
                <div class="trace-header">
                    <h3>Trace Controls</h3>
                    <div class="btn-group-small">
                        <button id="select-all-btn" class="btn-small">Select All</button>
                        <button id="clear-all-btn" class="btn-small">Clear All</button>
                    </div>
                </div>
                <div id="trace-list" class="trace-list">
                    <!-- Traces will be inserted here dynamically -->
                    <div class="empty-state">Upload a CSV to view traces</div>
                </div>
            </div>
        </aside>

        <!-- Main Content (Plot) -->
        <main class="main-content">
            <div id="plot-container" class="plot-container"></div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
